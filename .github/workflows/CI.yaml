name: CI Workflow

on:
  workflow_dispatch:

jobs:

# ---------------- CACHE JOB ----------------
  Cache:
    name: Cache Dependencies
    runs-on: ubuntu-latest

    outputs:
      cache-key: ${{ steps.cache.outputs.cache-primary-key }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Cache Node Modules
        id: cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            yarn.lock
            .yarn
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}

# ---------------- TEST JOB ----------------
  Test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: Cache

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore Cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            yarn.lock
            .yarn
          key: ${{ needs.Cache.outputs.cache-key }}

      - name: Install Dependencies
        run: yarn install

      - name: Install Angular CLI
        run: yarn global add @angular/cli

      - name: Run Tests
        run: |
          cd frontend
          ng test --watch=false --source-map=true
          cd ..
          npm run test:server

# ---------------- GITLEAKS ----------------
  GitLeaks:
    name: Run GitLeaks
    runs-on: ubuntu-latest
    needs: Cache

    steps:
      - uses: actions/checkout@v3

      - name: Run Gitleaks
        run: |
          docker run --rm -v ${{ github.workspace }}:/repo \
          zricethezav/gitleaks:latest detect \
          --source /repo \
          --report-format json \
          --report-path gitleaks.json

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Gitleaks-report
          path: gitleaks.json

# ---------------- NODEJSSCAN ----------------
  Nodejsscan:
    name: Run Nodejsscan
    runs-on: ubuntu-latest
    needs: Cache

    steps:
      - uses: actions/checkout@v3

      - name: Run Nodejsscan
        uses: ajinabraham/njsscan-action@master
        with:
          args: '. --sarif --output nodejsscan.sarif'

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Nodejsscan-report
          path: nodejsscan.sarif

# ---------------- SEMGREP ----------------
  Semgrep:
    name: Run Semgrep
    runs-on: ubuntu-latest
    needs: Cache
    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v3

      - name: Run Semgrep
        run: semgrep scan --config auto --json-output semgrep.json

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Semgrep-report
          path: semgrep.json

# ---------------- RETIREJS ----------------
  Retirejsscan:
    name: Run RetireJS
    runs-on: ubuntu-latest
    needs: Cache

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install RetireJS
        run: |
          yarn install
          npm install -g retire

      - name: Run RetireJS
        run: retire --path . --outputformat json --outputpath retirejsscan.json || true

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Retirejsscan-report
          path: retirejsscan.json

# ---------------- TRIVY + DOCKER ----------------
  Trivy:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: [GitLeaks, Nodejsscan, Semgrep, Retirejsscan]

    steps:
      - uses: actions/checkout@v3

      - name: Convert username to lowercase
        run: echo "DOCKER_USER=$(echo ${{ secrets.DOCKERHUB_USERNAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t docker.io/$DOCKER_USER/owasp-juiceapp:${{ github.sha }} .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/owasp-juiceapp:${{ github.sha }}
          format: json
          output: trivy.json

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push Image
        run: |
          docker push docker.io/$DOCKER_USER/owasp-juiceapp:${{ github.sha }}

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-report
          path: trivy.json

# ---------------- FINAL REPORT ----------------
  UploadReports:
    name: Upload Reports
    runs-on: ubuntu-latest
    needs: Trivy

    steps:
      - uses: actions/checkout@v3

      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Set Up Python
        uses: actions/setup-python@v4

      - name: Install Requests
        run: pip install requests

      - name: Run Upload Script
        run: |
          python3 upload-reports.py reports/gitleaks.json
          python3 upload-reports.py reports/nodejsscan.sarif
          python3 upload-reports.py reports/semgrep.json
          python3 upload-reports.py reports/retirejsscan.json
          python3 upload-reports.py reports/trivy.json
          
