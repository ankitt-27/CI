name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    - name: Run Angular tests
      run: |
        npm install -g @angular/cli
        ng test --watch=false --browsers=ChromeHeadless

  gitleaks:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run Gitleaks
      run: |
        docker run --rm \
        -v ${{ github.workspace }}:/repo \
        zricethezav/gitleaks:latest detect \
        --source=/repo \
        --report-format=json \
        --report-path=/repo/gitleaks.json

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: gitleaks-report
        path: gitleaks.json

  semgrep:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Run Semgrep
      run: |
        docker run --rm \
        -v "${PWD}:/src" \
        returntocorp/semgrep \
        semgrep scan --config auto --json --output semgrep.json

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: semgrep-report
        path: semgrep.json

  nodejsscan:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Run NodeJsScan
      run: |
        docker run --rm \
        -v ${{ github.workspace }}:/app \
        opensecurity/nodejsscan \
        nodejsscan -d /app -o /app/nodejsscan.json

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: nodejsscan-report
        path: nodejsscan.json

  retirejs:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Install RetireJS
      run: npm install -g retire

    - name: Run RetireJS
      run: retire --outputformat json --outputpath retirejs.json

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: retirejs-report
        path: retirejs.json

  docker-trivy:
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, nodejsscan, retirejs]

    steps:
    - uses: actions/checkout@v4

    - name: Convert username to lowercase
      run: echo "DOCKER_USER=$(echo ${{ secrets.DOCKERHUB_USERNAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Login to DockerHub
      run: |
        echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t docker.io/$DOCKER_USER/owasp-juiceapp:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push docker.io/$DOCKER_USER/owasp-juiceapp:${{ github.sha }}

    - name: Run Trivy scan
      run: |
        docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        aquasec/trivy image \
        --format json \
        --output trivy.json \
        docker.io/$DOCKER_USER/owasp-juiceapp:${{ github.sha }}

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: trivy.json
